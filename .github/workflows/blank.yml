name: CC19_DATA_MINIG_GIAN

# This triggers the action manually, or when you push to the main branch
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Grants the action permission to push code back to your repository
permissions:
  contents: write 

jobs:
  pull-run-push:
    runs-on: ubuntu-latest

    steps:
      # 1. "PULL" - This checks out your code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up the Python environment (similar to what Colab uses)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install required packages
      - name: Install dependencies
        run: |
          pip install jupyter nbconvert ipykernel
          # IMPORTANT: Add any other libraries your Colab notebook needs here
          # pip install pandas numpy matplotlib

      # 4. Run the notebook to generate new outputs
      - name: Execute Colab Notebook
        run: |
          # Replace 'your_notebook.ipynb' with your actual file name
          jupyter nbconvert --to notebook --execute --inplace your_notebook.ipynb

      # 5. "PUSH" - Commit the updated notebook back to GitHub
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add your_notebook.ipynb
          
          # This checks if the notebook actually changed before trying to commit
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated update from GitHub Actions"
          git push
